<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>理化段考複習補給站</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .card { max-width: 600px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; background: #3498db; color: white; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #2980b9; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; min-height: 24px; background: #f9f9f9; border: 1px dashed #ccc; }
        .hint { color: #7f8c8d; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🧪 理化 CH3 & CH4 挑戰</h1>
    <p><strong>題目：</strong> 關於化學平衡，當增加反應物的濃度時，平衡會往哪個方向移動？</p>
    
    <div class="btn-group">
        <button onclick="check(1)">向右（產物）</button>
        <button onclick="check(2)">向左（反應物）</button>
        <button onclick="check(3)">不移動</button>
    </div>

    <div id="result">快選一個答案試試！</div>

    <div class="hint">
        💡 <b>小提醒：</b> 勒沙特列原理告訴我們，系統會想辦法「抵消」你對它做的改變喔！
    </div>
</div>

<script>
    function check(ans) {
        const resultDiv = document.getElementById('result');
        if (ans === 1) {
            resultDiv.innerHTML = "✅ 正確！增加反應物，系統會想把它耗掉，所以向右移動。";
            resultDiv.style.color = "#27ae60";
            resultDiv.style.backgroundColor = "#eafaf1";
        } else if (ans === 2) {
            resultDiv.innerHTML = "❌ 錯囉！向左會產生更多反應物，這樣濃度會更高。";
            resultDiv.style.color = "#e74c3c";
            resultDiv.style.backgroundColor = "#fdedec";
        } else {
            resultDiv.innerHTML = "❌ 錯！濃度改變一定會影響平衡。";
            resultDiv.style.color = "#e74c3c";
            resultDiv.style.backgroundColor = "#fdedec";
        }
    }
</script>

</body>
</html>
